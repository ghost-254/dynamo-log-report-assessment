artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Accurately parse Apache-style request lines and aggregate the supplied access log."
solution_explanation = "Read each non-empty record, count requests and distinct source IPs, extract request-targets, and write the most frequent target with the counts as JSON."
verification_explanation = "Parse /app/report.json, validate its exact documented schema and types, and compare all three values with the independently determined summary of the fixed input log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

